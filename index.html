<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pomodoro</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#07111f;overflow:hidden;color:#dde2e6}

:root{
  --bg:#07111f;
  --bg-deep:#050a14;
  --navy:#0e1e32;
  --navy-2:#152944;
  --silver:#b8cad8;
  --silver-dim:#5a7a96;
  --silver-bright:#dde8f0;
  --warm-silver:#d4ccc0;
  --accent:#3a7bd5;
  --line:rgba(184,202,216,0.08);
  --line-2:rgba(184,202,216,0.18);
  --glass:rgba(10,20,38,0.78);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
}

/* ============ BACKGROUND ============ */
.stage{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 30% 20%, #0e1e32 0%, transparent 60%),
    radial-gradient(ellipse 70% 80% at 80% 80%, #0a1828 0%, transparent 60%),
    linear-gradient(180deg, #07111f 0%, #050a14 100%);
  overflow:hidden;
}

/* The fluid: three large soft blobs morphing via border-radius + transform.
   No SVG filters — pure CSS, GPU-friendly. */
.fluid{
  position:absolute;inset:-20%;
  mix-blend-mode:screen;
  opacity:0.85;
}

.blob{
  position:absolute;
  will-change:transform,border-radius;
  filter:blur(70px);
}
.blob-1{
  width:80vmax;height:80vmax;
  left:-20vmax;top:-25vmax;
  background:radial-gradient(circle at 50% 50%,
    rgba(184,202,216,0.55) 0%,
    rgba(120,150,180,0.30) 30%,
    rgba(58,123,213,0.15) 55%,
    transparent 75%);
  border-radius:60% 40% 55% 45% / 50% 55% 45% 50%;
  animation:b1 22s ease-in-out infinite alternate;
}
.blob-2{
  width:90vmax;height:90vmax;
  right:-30vmax;top:-10vmax;
  background:radial-gradient(circle at 50% 50%,
    rgba(150,175,200,0.50) 0%,
    rgba(90,120,160,0.28) 35%,
    transparent 70%);
  border-radius:50% 50% 45% 55% / 55% 45% 50% 50%;
  animation:b2 31s ease-in-out infinite alternate;
}
.blob-3{
  width:75vmax;height:75vmax;
  left:10vmax;bottom:-30vmax;
  background:radial-gradient(circle at 50% 50%,
    rgba(170,190,210,0.48) 0%,
    rgba(80,110,150,0.26) 35%,
    transparent 70%);
  border-radius:55% 45% 50% 50% / 45% 50% 50% 55%;
  animation:b3 26s ease-in-out infinite alternate;
}
.blob-4{
  width:65vmax;height:65vmax;
  right:-15vmax;bottom:-20vmax;
  background:radial-gradient(circle at 50% 50%,
    rgba(200,215,228,0.42) 0%,
    rgba(100,135,170,0.22) 35%,
    transparent 70%);
  border-radius:45% 55% 50% 50% / 50% 50% 55% 45%;
  animation:b4 37s ease-in-out infinite alternate;
}

@keyframes b1{
  0%{
    transform:translate(0,0) rotate(0deg) scale(1);
    border-radius:60% 40% 55% 45% / 50% 55% 45% 50%;
  }
  50%{
    transform:translate(10vw,7vh) rotate(25deg) scale(1.08);
    border-radius:50% 50% 45% 55% / 60% 40% 55% 45%;
  }
  100%{
    transform:translate(6vw,4vh) rotate(60deg) scale(0.95);
    border-radius:45% 55% 40% 60% / 55% 45% 60% 40%;
  }
}
@keyframes b2{
  0%{
    transform:translate(0,0) rotate(0deg) scale(1);
    border-radius:50% 50% 45% 55% / 55% 45% 50% 50%;
  }
  50%{
    transform:translate(-8vw,5vh) rotate(-20deg) scale(1.05);
    border-radius:60% 40% 55% 45% / 40% 60% 45% 55%;
  }
  100%{
    transform:translate(-5vw,3vh) rotate(-45deg) scale(1.1);
    border-radius:55% 45% 55% 45% / 45% 55% 45% 55%;
  }
}
@keyframes b3{
  0%{
    transform:translate(0,0) rotate(0deg) scale(1);
    border-radius:55% 45% 50% 50% / 45% 50% 50% 55%;
  }
  50%{
    transform:translate(8vw,-5vh) rotate(20deg) scale(0.92);
    border-radius:45% 55% 55% 45% / 50% 60% 40% 50%;
  }
  100%{
    transform:translate(4vw,-3vh) rotate(50deg) scale(1.06);
    border-radius:40% 60% 55% 45% / 55% 40% 60% 45%;
  }
}
@keyframes b4{
  0%{
    transform:translate(0,0) rotate(0deg) scale(1);
    border-radius:45% 55% 50% 50% / 50% 50% 55% 45%;
  }
  50%{
    transform:translate(-6vw,-4vh) rotate(-15deg) scale(1.12);
    border-radius:55% 45% 60% 40% / 45% 55% 50% 50%;
  }
  100%{
    transform:translate(-9vw,-6vh) rotate(-35deg) scale(0.98);
    border-radius:50% 50% 45% 55% / 60% 40% 50% 50%;
  }
}

/* Canvas grain — no tile seams, true noise */
.grain{
  position:fixed;inset:0;pointer-events:none;z-index:3;
  opacity:0.18;mix-blend-mode:overlay;
}

.vignette{
  position:fixed;inset:0;pointer-events:none;z-index:4;
  background:radial-gradient(ellipse at center,
    transparent 30%,
    rgba(5,10,20,0.5) 80%,
    rgba(5,10,20,0.85) 100%);
}

/* ============ PERIMETER TIMER — glowing edge ============ */
.perimeter{
  position:fixed;inset:0;pointer-events:none;z-index:5;
}
.perimeter svg{width:100%;height:100%;display:block}

/* ============ FULLSCREEN — minimizes to dot ============ */
.fs-wrap{
  position:fixed;top:0;right:0;z-index:20;
  padding:14px;
  pointer-events:none;
}
.fs-btn{
  background:rgba(10,20,38,0.5);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid var(--line);color:var(--silver-dim);
  width:10px;height:10px;border-radius:50%;
  font-size:0;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  pointer-events:auto;
  transition:
    width .55s cubic-bezier(0.22,0.61,0.36,1),
    height .55s cubic-bezier(0.22,0.61,0.36,1),
    border-radius .55s cubic-bezier(0.22,0.61,0.36,1),
    font-size .35s ease .15s,
    border-color .3s ease,
    color .3s ease;
}
.fs-btn:hover{
  width:38px;height:38px;
  border-radius:10px;
  font-size:15px;
  border-color:var(--line-2);
  color:var(--silver-bright);
}
.fs-btn i{
  opacity:0;
  transition:opacity 0s ease;
}
.fs-btn:hover i{
  opacity:1;
  transition:opacity .25s ease .2s;
}

/* ============ CENTER ============ */
.center{
  position:fixed;inset:0;z-index:6;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;
  padding:0 24px;
}
.center-time{
  font-family:var(--serif);
  font-size:clamp(72px,18vw,148px);
  font-weight:300;
  color:var(--silver-bright);
  line-height:0.9;
  letter-spacing:-0.02em;
  font-variant-numeric:tabular-nums;
  text-shadow:0 2px 50px rgba(0,0,0,0.5);
  transition:opacity .4s ease;
}
.center-sub{
  font-family:var(--sans);font-size:10px;
  letter-spacing:0.32em;text-transform:uppercase;
  color:var(--silver-dim);
  margin-top:28px;
  opacity:0.7;
  transition:opacity .4s ease;
}
.idle .center-sub{opacity:0.4}

/* ============ DONE BANNER ============ */
.done-banner{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,calc(-50% + 160px));
  z-index:15;
  background:var(--glass);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--line-2);
  border-radius:14px;
  padding:18px 28px;
  display:flex;align-items:center;gap:20px;
  font-family:var(--sans);
  opacity:0;transition:opacity .4s ease;
  pointer-events:none;
  max-width:90vw;
}
.done-banner.show{opacity:1;pointer-events:auto}
.done-banner p{font-size:13px;color:var(--silver);letter-spacing:0.04em;line-height:1.5}
.done-banner button{
  background:transparent;border:1px solid var(--line-2);color:var(--silver-bright);
  padding:8px 20px;border-radius:20px;font-size:10px;letter-spacing:0.22em;
  text-transform:uppercase;cursor:pointer;font-family:var(--sans);
  transition:all .2s;white-space:nowrap;
}
.done-banner button:hover{border-color:var(--silver);background:rgba(184,202,216,0.08)}

/* ============ DOCK — iPhone home-indicator style ============ */
.dock-wrap{
  position:fixed;
  left:0;right:0;bottom:14px;
  z-index:30;
  display:flex;
  justify-content:center;
  /* Hover target larger than visible bar for easier reveal */
  padding:18px 0;
  pointer-events:none;
}

.dock{
  background:var(--glass);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid var(--line);
  border-radius:999px;
  transition:
    width .55s cubic-bezier(0.22,0.61,0.36,1),
    height .55s cubic-bezier(0.22,0.61,0.36,1),
    border-radius .55s cubic-bezier(0.22,0.61,0.36,1),
    border-color .35s ease,
    opacity .45s ease,
    transform .45s ease;
  overflow:hidden;
  /* Collapsed: tiny bar, like the iPhone home indicator */
  width:140px;
  height:8px;
  cursor:pointer;
  pointer-events:auto;
}
.dock:hover,.dock.open{
  width:min(440px,calc(100vw - 32px));
  height:auto;
  min-height:56px;
  border-radius:20px;
  border-color:var(--line-2);
  cursor:default;
}

.dock-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  height:56px;
  opacity:0;
  pointer-events:none;
  transition:opacity .35s ease .18s;
}
.dock:hover .dock-bar,
.dock.open .dock-bar{
  opacity:1;
  pointer-events:auto;
}
.dock-bar-left{
  display:flex;align-items:center;gap:12px;
  min-width:0;
}
.dock-mode-tag{
  font-family:var(--sans);font-size:9px;
  letter-spacing:0.24em;text-transform:uppercase;
  color:var(--silver-bright);
  padding:4px 10px;
  border:1px solid var(--line-2);
  border-radius:20px;
  white-space:nowrap;
}
.dock-time{
  font-family:var(--mono);font-size:15px;font-weight:400;
  color:var(--silver-bright);
  letter-spacing:0.02em;
  font-variant-numeric:tabular-nums;
}
.dock-bar-right{display:flex;align-items:center;gap:8px}
.dock-play{
  background:rgba(184,202,216,0.10);
  border:1px solid var(--line-2);
  color:var(--silver-bright);
  width:36px;height:36px;border-radius:50%;
  font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.dock-play:hover{background:rgba(184,202,216,0.18)}
.dock-expand{
  background:transparent;border:none;
  color:var(--silver-dim);
  width:30px;height:30px;border-radius:50%;
  font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.dock-expand:hover{color:var(--silver-bright)}
.dock-expand i{transition:transform .42s cubic-bezier(0.22,0.61,0.36,1)}
.dock.open .dock-expand i{transform:rotate(180deg)}

/* Expanded panel — opens on hover OR click */
.dock-panel{
  max-height:0;overflow:hidden;
  transition:max-height .55s cubic-bezier(0.22,0.61,0.36,1);
}
.dock:hover .dock-panel,
.dock.open .dock-panel{max-height:340px}

.dock-panel-inner{
  padding:4px 16px 16px;
  border-top:1px solid var(--line);
  margin-top:0;
}

.mode-row{
  display:flex;
  background:rgba(5,10,20,0.5);
  border:1px solid var(--line);
  border-radius:30px;
  padding:3px;
  margin:14px 0 14px;
}
.mode-btn{
  flex:1;
  background:transparent;border:none;color:var(--silver-dim);
  padding:8px 16px;border-radius:26px;
  font-family:var(--sans);font-size:10px;font-weight:400;
  letter-spacing:0.22em;text-transform:uppercase;
  cursor:pointer;transition:all .25s;
}
.mode-btn.active{
  background:rgba(58,123,213,0.18);
  color:var(--silver-bright);
}

.session-row{
  display:flex;justify-content:center;gap:8px;
  margin-bottom:14px;
}
.pip{
  width:5px;height:5px;border-radius:50%;
  background:var(--line-2);
  transition:background .3s;
}
.pip.done{background:var(--accent)}

.settings-row{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
.setting-block{
  text-align:center;
  padding:10px 8px;
  border-radius:12px;
  background:rgba(5,10,20,0.4);
  border:1px solid var(--line);
}
.setting-label{
  font-family:var(--sans);font-size:9px;
  letter-spacing:0.24em;text-transform:uppercase;
  color:var(--silver-dim);
  margin-bottom:6px;
}
.setting-ctrl{
  display:flex;align-items:center;justify-content:center;gap:14px;
}
.adj-btn{
  background:transparent;border:none;
  color:var(--silver-dim);
  width:26px;height:26px;
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:color .15s;line-height:1;
  font-family:var(--sans);
}
.adj-btn:hover{color:var(--silver-bright)}
.setting-val{
  font-family:var(--serif);font-size:22px;font-weight:400;
  color:var(--silver-bright);
  min-width:32px;text-align:center;
  font-variant-numeric:tabular-nums;
}

.dock-reset{
  display:flex;justify-content:center;
  margin-top:12px;
}
.reset-btn{
  background:transparent;border:1px solid var(--line);
  color:var(--silver-dim);
  padding:7px 18px;border-radius:20px;
  font-family:var(--sans);font-size:9px;
  letter-spacing:0.24em;text-transform:uppercase;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:8px;
}
.reset-btn:hover{border-color:var(--line-2);color:var(--silver)}
.reset-btn i{font-size:12px}

.dock-wrap.hidden-bar .dock{
  opacity:0.35;
  transform:scaleY(0.6);
}

/* ============ MOBILE ============ */
@media (max-width:480px){
  .center-time{font-size:clamp(64px,20vw,96px)}
  .fs-wrap{padding:10px}
  .dock-wrap{bottom:12px;padding:18px 0}
  .dock{width:120px;height:6px}
  .dock:hover,.dock.open{width:calc(100vw - 28px);min-height:54px}
  .dock-bar{padding:0 14px;height:54px}
  .dock-mode-tag{font-size:8.5px;padding:4px 8px}
  .dock-time{font-size:14px}
  .done-banner{
    flex-direction:column;gap:12px;text-align:center;
    transform:translate(-50%,calc(-50% + 120px));
    padding:16px 22px;
  }
}

@media (prefers-reduced-motion:reduce){
  .blob-1,.blob-2,.blob-3,.blob-4{animation:none}
}
</style>
</head>
<body>

<!-- SVG filter defs for fluid distortion + perimeter glow -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="edge-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="edge-glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>

<!-- FLUID BACKGROUND -->
<div class="stage">
  <div class="fluid">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>
</div>

<!-- Canvas grain -->
<canvas class="grain" id="grain-canvas"></canvas>

<div class="vignette"></div>

<!-- PERIMETER TIMER -->
<div class="perimeter">
  <svg id="perimeter-svg" preserveAspectRatio="none"></svg>
</div>

<div class="fs-wrap">
  <button class="fs-btn" id="fs-btn" onclick="toggleFS()" aria-label="Toggle fullscreen">
    <i class="ti ti-maximize" id="fs-icon"></i>
  </button>
</div>

<div class="center" id="center">
  <div class="center-time" id="center-time">25:00</div>
  <div class="center-sub" id="center-sub">Ready</div>
</div>

<div class="done-banner" id="done-banner">
  <p id="done-msg">Session complete</p>
  <button onclick="acknowledge()">Continue</button>
</div>

<!-- DOCK -->
<div class="dock-wrap" id="dock-wrap">
  <div class="dock" id="dock" onclick="handleDockClick(event)">
    <div class="dock-bar" id="dock-bar">
      <div class="dock-bar-left">
        <span class="dock-mode-tag" id="dock-mode-tag">Focus</span>
        <span class="dock-time" id="dock-time">25:00</span>
      </div>
      <div class="dock-bar-right">
        <button class="dock-play" id="dock-play" onclick="toggleTimer(event)" aria-label="Start">
          <i class="ti ti-player-play" id="play-icon"></i>
        </button>
      </div>
    </div>

    <div class="dock-panel">
      <div class="dock-panel-inner">
        <div class="mode-row">
          <button class="mode-btn active" id="btn-work" onclick="switchMode('work',event)">Focus</button>
          <button class="mode-btn" id="btn-break" onclick="switchMode('break',event)">Break</button>
        </div>

        <div class="session-row" id="pips"></div>

        <div class="settings-row">
          <div class="setting-block">
            <div class="setting-label">Focus</div>
            <div class="setting-ctrl">
              <button class="adj-btn" onclick="adjustTime('work',-1,event)">−</button>
              <span class="setting-val" id="work-val">25</span>
              <button class="adj-btn" onclick="adjustTime('work',1,event)">+</button>
            </div>
          </div>
          <div class="setting-block">
            <div class="setting-label">Break</div>
            <div class="setting-ctrl">
              <button class="adj-btn" onclick="adjustTime('break',-1,event)">−</button>
              <span class="setting-val" id="break-val">5</span>
              <button class="adj-btn" onclick="adjustTime('break',1,event)">+</button>
            </div>
          </div>
        </div>

        <div class="dock-reset">
          <button class="reset-btn" onclick="resetTimer(event)">
            <i class="ti ti-refresh"></i>
            Reset
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ============ CANVAS GRAIN ============ */
(function(){
  var c = document.getElementById('grain-canvas');
  function resize(){
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    var ctx = c.getContext('2d');
    var imgData = ctx.createImageData(c.width, c.height);
    var d = imgData.data;
    for(var i=0;i<d.length;i+=4){
      var v = Math.random()*255;
      d[i]=v;d[i+1]=v;d[i+2]=v;d[i+3]=255;
    }
    ctx.putImageData(imgData,0,0);
  }
  resize();
  window.addEventListener('resize',resize);
})();

/* ============ STATE ============ */
var workMins=25, breakMins=5, mode='work', running=false;
var remaining=25*60, totalSecs=25*60;
var interval=null, sessCount=0, maxSess=4, waiting=false;
var dockOpen=false, dockHideTimer=null, idleTimer=null;

function fmt(s){
  var m=Math.floor(s/60), sec=s%60;
  return (m<10?'0':'')+m+':'+(sec<10?'0':'')+sec;
}
function updateDisplay(){
  var t=fmt(remaining);
  document.getElementById('center-time').textContent=t;
  document.getElementById('dock-time').textContent=t;
  updatePerimeter();
}
function updatePips(){
  var el=document.getElementById('pips'); el.innerHTML='';
  for(var i=0;i<maxSess;i++){
    var d=document.createElement('div');
    d.className='pip'+(i<sessCount?' done':'');
    el.appendChild(d);
  }
}
function setStatus(t){document.getElementById('center-sub').textContent=t}
function setMode(m){
  mode=m;
  totalSecs=(m==='work'?workMins:breakMins)*60;
  remaining=totalSecs;
  var label = m==='work'?'Focus':'Break';
  document.getElementById('dock-mode-tag').textContent=label;
  document.getElementById('btn-work').className='mode-btn'+(m==='work'?' active':'');
  document.getElementById('btn-break').className='mode-btn'+(m==='break'?' active':'');
  document.getElementById('work-val').textContent=workMins;
  document.getElementById('break-val').textContent=breakMins;
  updateDisplay();
}
function switchMode(m,e){
  if(e)e.stopPropagation();
  if(!running && !waiting){setMode(m);setStatus('Ready');}
}
function toggleTimer(e){
  if(e)e.stopPropagation();
  if(waiting)return;
  if(running){
    clearInterval(interval);running=false;
    document.getElementById('play-icon').className='ti ti-player-play';
    setStatus('Paused');showDock();
  } else {
    running=true;
    document.getElementById('play-icon').className='ti ti-player-pause';
    setStatus(mode==='work'?'Focusing':'On break');
    interval=setInterval(tick,1000);
    closeDock();scheduleHideDock();
  }
}
function tick(){
  if(remaining<=0){clearInterval(interval);running=false;sessionDone();return;}
  remaining--;updateDisplay();
}
function sessionDone(){
  document.getElementById('play-icon').className='ti ti-player-play';
  waiting=true;
  if(mode==='work'){sessCount=Math.min(sessCount+1,maxSess);updatePips();}
  document.getElementById('done-msg').textContent =
    mode==='work' ? 'Focus session complete — time for a break.' : 'Break over — ready to focus?';
  document.getElementById('done-banner').classList.add('show');
  setStatus('Session complete');showDock();
}
function acknowledge(){
  waiting=false;
  document.getElementById('done-banner').classList.remove('show');
  var nx = mode==='work' ? 'break' : 'work';
  if(sessCount>=maxSess && nx==='work'){sessCount=0;updatePips();}
  setMode(nx);setStatus('Ready');
}
function resetTimer(e){
  if(e)e.stopPropagation();
  clearInterval(interval);running=false;waiting=false;
  document.getElementById('play-icon').className='ti ti-player-play';
  document.getElementById('done-banner').classList.remove('show');
  setMode(mode);setStatus('Ready');
}
function adjustTime(which,delta,e){
  if(e)e.stopPropagation();
  if(running||waiting)return;
  if(which==='work') workMins=Math.max(1,Math.min(90,workMins+delta));
  else breakMins=Math.max(1,Math.min(30,breakMins+delta));
  document.getElementById('work-val').textContent=workMins;
  document.getElementById('break-val').textContent=breakMins;
  if(which===mode) setMode(mode);
}

/* ============ PERIMETER — uniform glow tracing the physical screen edge ============ */
var perimeterLength = 0;
function buildPerimeter(){
  var svg = document.getElementById('perimeter-svg');
  var w = window.innerWidth, h = window.innerHeight;
  svg.setAttribute('viewBox','0 0 '+w+' '+h);
  svg.setAttribute('width',w);svg.setAttribute('height',h);
  // Sharp square corners matching the physical screen. Inset just enough that
  // the stroke isn't clipped by the viewport.
  var inset = 1.5;
  var cx = w/2;
  // Path starts at top-center, traces COUNTER-clockwise around the full rectangle, ends back at top-center.
  // As time elapses, the tail recedes — visually the right side empties first, light remains on the left.
  var pathD =
    'M '+cx+' '+inset+
    ' L '+inset+' '+inset+
    ' L '+inset+' '+(h-inset)+
    ' L '+(w-inset)+' '+(h-inset)+
    ' L '+(w-inset)+' '+inset+
    ' L '+cx+' '+inset;

  svg.innerHTML =
    '<defs>'+
      // Uniform silver — same opacity all the way around.
      '<linearGradient id="trail-focus" x1="0%" y1="0%" x2="0%" y2="100%">'+
        '<stop offset="0%" stop-color="#dde8f0" stop-opacity="0.95"/>'+
        '<stop offset="100%" stop-color="#b8cad8" stop-opacity="0.95"/>'+
      '</linearGradient>'+
      '<linearGradient id="trail-break" x1="0%" y1="0%" x2="0%" y2="100%">'+
        '<stop offset="0%" stop-color="#f0e6d4" stop-opacity="0.95"/>'+
        '<stop offset="100%" stop-color="#d4ccc0" stop-opacity="0.95"/>'+
      '</linearGradient>'+
    '</defs>'+
    // Blurred glow layer — soft bloom outside the line
    '<path id="perimeter-glow" d="'+pathD+'" fill="none" stroke="url(#trail-focus)" '+
      'stroke-width="4" stroke-linecap="butt" stroke-linejoin="miter" '+
      'filter="url(#edge-glow-strong)" opacity="0.55"/>'+
    // Sharp inner line, square joins to keep corners crisp
    '<path id="perimeter-progress" d="'+pathD+'" fill="none" stroke="url(#trail-focus)" '+
      'stroke-width="1.5" stroke-linecap="butt" stroke-linejoin="miter" '+
      'filter="url(#edge-glow)"/>';

  var path = document.getElementById('perimeter-progress');
  perimeterLength = path.getTotalLength();
  updatePerimeter();
}
function updatePerimeter(){
  var path = document.getElementById('perimeter-progress');
  var glow = document.getElementById('perimeter-glow');
  if(!path || !perimeterLength) return;
  var pct = remaining / totalSecs;
  // Single-sided: line starts at top-center, traces clockwise.
  // Visible portion is one continuous stroke from the start of the path.
  var visible = perimeterLength * pct;
  var gap = perimeterLength - visible;
  path.setAttribute('stroke-dasharray', visible+' '+gap);
  glow.setAttribute('stroke-dasharray', visible+' '+gap);
  var grad = mode==='break' ? 'url(#trail-break)' : 'url(#trail-focus)';
  path.setAttribute('stroke', grad);
  glow.setAttribute('stroke', grad);
}
window.addEventListener('resize', buildPerimeter);

/* ============ DOCK ============ */
function handleDockClick(e){
  // If they clicked a button, let the button handle it
  if(e.target.closest('button')) return;
  // On touch devices (no hover), tap toggles open
  if(dockOpen) closeDock(); else openDock();
}
function openDock(){
  dockOpen=true;
  document.getElementById('dock').classList.add('open');
  document.getElementById('dock-wrap').classList.remove('hidden-bar');
  clearTimeout(dockHideTimer);
}
function closeDock(){
  dockOpen=false;
  document.getElementById('dock').classList.remove('open');
}
function showDock(){
  document.getElementById('dock-wrap').classList.remove('hidden-bar');
  clearTimeout(dockHideTimer);
  if(running && !dockOpen) scheduleHideDock();
}
function scheduleHideDock(){
  clearTimeout(dockHideTimer);
  dockHideTimer = setTimeout(function(){
    if(running && !dockOpen && !waiting){
      document.getElementById('dock-wrap').classList.add('hidden-bar');
    }
  }, 4000);
}
function onActivity(){
  if(running && !waiting){
    showDock();
    document.body.classList.remove('idle');
    clearTimeout(idleTimer);
    idleTimer = setTimeout(function(){document.body.classList.add('idle');}, 6000);
  }
}
['mousemove','touchstart','keydown','click'].forEach(function(ev){
  document.addEventListener(ev, onActivity, {passive:true});
});

/* ============ FULLSCREEN ============ */
function toggleFS(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
    document.getElementById('fs-icon').className='ti ti-minimize';
  } else {
    document.exitFullscreen();
    document.getElementById('fs-icon').className='ti ti-maximize';
  }
}
document.addEventListener('fullscreenchange',function(){
  if(!document.fullscreenElement){
    document.getElementById('fs-icon').className='ti ti-maximize';
  }
});

/* ============ INIT ============ */
buildPerimeter();
setMode('work');
updatePips();
</script>
